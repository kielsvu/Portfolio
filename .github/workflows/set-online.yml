name: Set Online

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: status-update
  cancel-in-progress: false

jobs:
  set-online:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write online status
        run: |
          printf '{\n  "available": true,\n  "label": "Available for work",\n  "updated": "%s"\n}\n' \
            "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > status.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "chore: set online"
          git pull --rebase origin main
          git push
