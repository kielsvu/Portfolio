name: Set Online

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  set-online:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write status
        run: |
          DATE_PHT=$(TZ='Asia/Manila' date +%Y-%m-%d)
          HOUR_PHT=$(TZ='Asia/Manila' date +%H)
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          AVAILABLE=false
          LABEL="Unavailable"

          if [ "$DATE_PHT" \<= "2026-06-07" ] && [ "$HOUR_PHT" -ge 10 ]; then
            AVAILABLE=true
            LABEL="Available for work"
          fi

          if [ "$DATE_PHT" \>= "2026-06-08" ] && [ "$DATE_PHT" \<= "2027-03-30" ] && [ "$HOUR_PHT" -ge 15 ] && [ "$HOUR_PHT" -lt 21 ]; then
            AVAILABLE=true
            LABEL="Available for work"
          fi

          printf '{\n  "available": %s,\n  "label": "%s",\n  "updated": "%s"\n}\n' "$AVAILABLE" "$LABEL" "$UPDATED" > status.json
          echo "date=$DATE_PHT hour=$HOUR_PHT available=$AVAILABLE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "chore: set status"
          git push
          
